<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Семён Скрепецкий · Semyon Skrepetsky — Картинная галерея / Memorial archive</title>
<!-- Data file. Generated by scripts/archive_skrepetsky.py and enriched with English translations (text_en). -->
<!-- Bilingual RU/EN memorial archive. Language toggle persists in localStorage. -->
<script src="catalog-data.js"></script>
<style>
  :root{
    --bg:#11100e; --bg2:#1a1916; --card:#1f1d19; --line:#332f28;
    --text:#ece7dd; --muted:#9a9384; --accent:#c9a24b; --accent2:#e0c373;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
       font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
       line-height:1.5}
  a{color:var(--accent2);text-decoration:none}
  a:hover{text-decoration:underline}

  /* Language switcher */
  .langbar{position:fixed;top:12px;right:14px;z-index:50;display:flex;gap:2px;
    background:rgba(20,19,16,.82);border:1px solid var(--line);border-radius:20px;
    padding:3px;backdrop-filter:blur(8px)}
  .langbar button{background:transparent;border:none;color:var(--muted);
    font-size:13px;font-weight:600;letter-spacing:.04em;padding:5px 12px;border-radius:16px;
    cursor:pointer;font-family:inherit}
  .langbar button.active{background:var(--accent);color:#1a1610}

  header.hero{padding:60px 20px 30px;text-align:center;
    background:radial-gradient(120% 100% at 50% 0%,#262320 0%,var(--bg) 70%);
    border-bottom:1px solid var(--line)}
  .hero .kicker{letter-spacing:.32em;text-transform:uppercase;
    font-size:12px;color:var(--accent);margin-bottom:14px}
  .hero h1{font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:clamp(28px,5vw,46px);margin:0 0 4px}
  .hero .dates{font-family:Georgia,serif;color:var(--accent2);font-size:16px;margin:0 0 10px;letter-spacing:.05em}
  .hero h2{font-family:Georgia,serif;font-weight:400;font-size:clamp(15px,2.5vw,20px);
    color:var(--muted);margin:0 0 18px}
  .hero p.bio{max-width:720px;margin:0 auto;color:#cfc7b8;font-size:15.5px}
  .hero .meta{margin-top:20px;color:var(--muted);font-size:13px}
  .hero .meta a{color:var(--accent2)}

  .toolbar{position:sticky;top:0;z-index:20;background:rgba(17,16,14,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
    padding:12px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;
    justify-content:center}
  .toolbar input{background:var(--bg2);border:1px solid var(--line);color:var(--text);
    padding:9px 13px;border-radius:8px;min-width:230px;font-size:14px}
  .chip{background:var(--bg2);border:1px solid var(--line);color:var(--muted);
    padding:7px 13px;border-radius:20px;font-size:13px;cursor:pointer;user-select:none}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#1a1610;font-weight:600}
  .chip.more-chip{border-color:var(--accent);color:var(--accent2)}
  .count{color:var(--muted);font-size:13px;margin-left:4px}

  main{max-width:1180px;margin:0 auto;padding:26px 16px 80px}
  .grid{columns:320px;column-gap:18px}
  .card{break-inside:avoid;background:var(--card);border:1px solid var(--line);
    border-radius:12px;overflow:hidden;margin:0 0 18px;display:inline-block;width:100%}
  .card .media{position:relative;background:#000;line-height:0}
  .card .media img,.card .media video{width:100%;height:auto;display:block}
  .card .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.7);
    color:#fff;font-size:11px;padding:3px 8px;border-radius:12px}
  .card .album-badge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);
    color:#fff;font-size:11px;padding:3px 8px;border-radius:12px}
  .card .body{padding:13px 15px 15px}
  .card .txt{white-space:pre-wrap;font-size:14px;color:#e3ddd1;margin:0 0 10px}
  .card .untr{font-size:11px;color:var(--muted);font-style:italic;margin:0 0 8px;opacity:.8}
  .tags{margin:6px 0 0}
  .tag{display:inline-block;font-size:11px;color:var(--accent2);background:#26231d;
    border:1px solid var(--line);padding:1px 7px;border-radius:10px;margin:2px 4px 0 0}
  .foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;
    color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:9px}
  .foot a{color:var(--muted)}
  .react{font-size:12px;color:var(--muted);margin-top:7px}
  .react span{margin-right:9px;white-space:nowrap}

  .empty{text-align:center;color:var(--muted);padding:60px 20px}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:30px 16px 50px;
    border-top:1px solid var(--line)}

  /* Lightbox */
  #lb{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;
    align-items:center;justify-content:center;z-index:100;padding:20px}
  #lb.open{display:flex}
  #lb img,#lb video{max-width:95vw;max-height:92vh}
  #lb .x{position:absolute;top:16px;right:22px;color:#fff;font-size:34px;cursor:pointer}
</style>
</head>
<body>

<div class="langbar">
  <button data-lang="ru">RU</button>
  <button data-lang="en">EN</button>
</div>

<header class="hero">
  <div class="kicker" data-i18n="kicker"></div>
  <h1>Семён Скрепецкий · Semyon Skrepetsky</h1>
  <div class="dates" data-i18n="dates"></div>
  <h2 data-i18n="subtitle"></h2>
  <p class="bio" data-i18n="bio"></p>
  <div class="meta">
    <span data-i18n="channelLabel"></span>:
    <a id="srcLink" href="https://t.me/SemyonSkrepetsky" target="_blank" rel="noopener">@SemyonSkrepetsky</a>
    · <a href="https://www.youtube.com/@СемёнСкрепецкий" target="_blank" rel="noopener">YouTube</a>
    · <span id="stat"></span>
  </div>
</header>

<div class="toolbar">
  <input id="q" type="search" autocomplete="off">
  <span class="chip active" data-f="all"   data-i18n="f_all"></span>
  <span class="chip"        data-f="photo" data-i18n="f_photo"></span>
  <span class="chip"        data-f="video" data-i18n="f_video"></span>
  <span class="chip"        data-f="painting" data-i18n="f_painting"></span>
  <span class="chip"        data-f="text"  data-i18n="f_text"></span>
  <span class="chip more-chip" data-f="more" data-i18n="f_more"></span>
  <span class="count" id="count"></span>
</div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none" data-i18n="empty"></div>
  <div style="text-align:center;margin-top:10px">
    <button id="moreBtn" style="display:none;background:var(--accent);color:#1a1610;
      border:none;padding:11px 22px;border-radius:22px;font-size:14px;font-weight:600;
      cursor:pointer" data-i18n="more"></button>
  </div>
  <div id="sentinel" style="height:1px"></div>
</main>

<footer>
  <span data-i18n="footer"></span>
  <a href="https://t.me/SemyonSkrepetsky" target="_blank" rel="noopener">@SemyonSkrepetsky</a>.
</footer>

<div id="lb"><span class="x">&times;</span></div>

<script>
(function(){
  var DATA = window.CATALOG || null;

  // ---------- i18n ----------
  var I18N = {
    ru:{
      kicker:"Памяти",
      dates:"1981 — 2026",
      subtitle:"Художник-акционист — «создатель смыслов»",
      bio:"Роберт Кузовков, известный как Семён Скрепецкий, — российский художник-акционист и карикатурист. Родился в 1981 году в Алтайском крае. В 2021 году эмигрировал в Польшу, спасаясь от преследований. В живописи и перформансах высмеивал Путина, Кадырова, Лукашенко и российскую пропаганду. 12 июня 2026 года провёл свою последнюю акцию у российского посольства в Берлине. 15 июня 2026 года был застрелен в польском городе Бяла-Подляска. Этот архив сохраняет его канал — картины, перформансы, видео и записи, — чтобы его искусство и его смыслы остались с нами.",
      channelLabel:"Оригинальный канал",
      statPosts:"публикаций в архиве",
      search:"Поиск по текстам и хэштегам…",
      f_all:"Всё", f_photo:"Фото", f_video:"Видео", f_painting:"Картины", f_text:"Только текст",
      f_more:"Продолжение",
      results:"результатов",
      more:"Показать ещё ▾",
      empty:"Ничего не найдено.",
      untranslated:"Перевод на английский пока недоступен.",
      original:"оригинал ↗",
      footer:"Архив создан в память о Семёне Скрепецком. Оригинальный контент публичного канала"
    },
    en:{
      kicker:"In memory of",
      dates:"1981 — 2026",
      subtitle:"Performance artist — “creator of meanings”",
      bio:"Robert Kuzovkov, known as Semyon Skrepetsky, was a Russian dissident artist, actionist and caricaturist. Born in 1981 in Altai Krai, Russia, he emigrated to Poland in 2021 to escape political persecution. Through painting and performance he mocked Putin, Kadyrov, Lukashenko and Russian propaganda. On 12 June 2026 he staged his final performance outside the Russian Embassy in Berlin. On 15 June 2026 he was shot dead in the Polish town of Biała Podlaska. This archive preserves his channel — his paintings, performances, videos and writings — so that his art and his meanings endure.",
      channelLabel:"Original channel",
      statPosts:"posts archived",
      search:"Search texts and hashtags…",
      f_all:"All", f_photo:"Photos", f_video:"Videos", f_painting:"Paintings", f_text:"Text only",
      f_more:"More",
      results:"results",
      more:"Load more ▾",
      empty:"No results.",
      untranslated:"English translation not yet available.",
      original:"original ↗",
      footer:"Archive created in memory of Semyon Skrepetsky. Original content from the public channel"
    }
  };
  var LANG = (function(){
    try{ var s=localStorage.getItem('memorial_lang'); if(s==='ru'||s==='en') return s; }catch(e){}
    return 'ru';
  })();
  function t(k){ return (I18N[LANG]&&I18N[LANG][k])||I18N.ru[k]||k; }

  function applyStaticI18n(){
    document.documentElement.lang = LANG;
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      el.textContent = t(el.getAttribute('data-i18n'));
    });
    document.getElementById('q').placeholder = t('search');
    document.querySelectorAll('.langbar button').forEach(function(b){
      b.classList.toggle('active', b.getAttribute('data-lang')===LANG);
    });
    updateStat();
  }
  function updateStat(){
    if(!DATA) return;
    document.getElementById('stat').textContent =
      (DATA.post_count||DATA.posts.length)+' '+t('statPosts');
  }
  function setLang(l){
    if(l!==LANG){ LANG=l; try{localStorage.setItem('memorial_lang',l);}catch(e){} }
    applyStaticI18n();
    if(DATA && DATA.posts) rerender();
  }

  // ---------- catalog ----------
  function boot(data){
    if(!data || !data.posts){
      document.getElementById('grid').innerHTML =
        '<div class="empty">catalog-data.js not found.</div>';
      applyStaticI18n();
      return;
    }
    if(data.channel_url) document.getElementById('srcLink').href = data.channel_url;
    applyStaticI18n();
    wire(data.posts);
    render(data.posts);
    // Load the "More" section (new works that continue his legacy) from /more/more.json
    fetch('more/more.json').then(function(r){return r.json();})
      .then(function(d){ _morePosts = (d&&d.posts)?d.posts:(Array.isArray(d)?d:[]); })
      .catch(function(){ _morePosts=[]; });
    var btn=document.getElementById('moreBtn');
    if(btn) btn.addEventListener('click', renderMore);
    if('IntersectionObserver' in window){
      new IntersectionObserver(function(entries){
        if(entries[0].isIntersecting && _shown<_cur.length) renderMore();
      },{rootMargin:'600px'}).observe(document.getElementById('sentinel'));
    }
  }

  // local media live alongside index.html at the site root (media/…)
  function loc(p){ return p || null; }

  function mediaItems(post){
    var items=[];
    var lp=post.local_photos||[], lv=post.local_videos||[], lt=post.local_thumbs||[];
    (lp.length?lp:post.photos||[]).forEach(function(u,i){
      items.push({type:'img', src: lp.length?loc(lp[i]):u});
    });
    (lv.length?lv:post.videos||[]).forEach(function(u,i){
      var poster = lt.length?loc(lt[i]):(post.video_thumbs&&post.video_thumbs[i]);
      items.push({type:'video', src: lv.length?loc(lv[i]):u, poster:poster});
    });
    return items;
  }

  function esc(s){return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}

  // text shown for current language
  function postText(post){
    if(LANG==='en'){
      if(post.text_en && post.text_en.trim()) return {txt:post.text_en, untr:false};
      if(post.text && post.text.trim())       return {txt:post.text, untr:true};
      return {txt:'', untr:false};
    }
    return {txt:post.text||'', untr:false};
  }

  function fmtDate(post){
    if(!post.datetime) return '';
    var d=new Date(post.datetime); if(isNaN(d)) return '';
    return d.toLocaleDateString(LANG==='en'?'en-GB':'ru-RU',{year:'numeric',month:'short',day:'numeric'});
  }

  function card(post){
    var items = mediaItems(post);
    var el = document.createElement('div'); el.className='card';
    var html='';

    if(items.length){
      var m=items[0];
      html += '<div class="media">';
      if(m.type==='img'){
        html += '<img loading="lazy" src="'+m.src+'" alt="" data-full="'+m.src+'">';
      }else{
        html += '<video controls preload="none" '+(m.poster?('poster="'+m.poster+'"'):'')+
                ' src="'+m.src+'"></video>';
      }
      if(items.length>1)
        html += '<span class="album-badge">🖼 '+items.length+'</span>';
      html += '</div>';
    }

    html += '<div class="body">';
    var pt=postText(post);
    if(pt.untr) html += '<div class="untr">'+esc(t('untranslated'))+'</div>';
    if(pt.txt){
      html += '<div class="txt">'+esc(pt.txt)+'</div>';
    }
    if(post.hashtags && post.hashtags.length){
      html += '<div class="tags">'+post.hashtags.map(function(t){
        return '<span class="tag">#'+esc(t)+'</span>';}).join('')+'</div>';
    }
    if(post.reactions && Object.keys(post.reactions).length){
      html += '<div class="react">'+Object.keys(post.reactions).map(function(k){
        return '<span>'+k+' '+post.reactions[k]+'</span>';}).join('')+'</div>';
    }
    html += '<div class="foot"><span>'+esc(fmtDate(post))+
            (post.views?(' · '+esc(post.views)+' 👁'):'')+'</span>'+
            (post.url?('<a href="'+esc(post.url)+'" target="_blank" rel="noopener">'+esc(t('original'))+'</a>'):'')+
            '</div>';
    html += '</div>';
    el.innerHTML = html;

    var img=el.querySelector('.media img');
    if(img) img.addEventListener('click',function(){openLB('img',img.dataset.full);});
    return el;
  }

  var BATCH = 48, _cur = [], _shown = 0;

  function render(posts){
    _cur = posts; _shown = 0;
    document.getElementById('grid').innerHTML='';
    document.getElementById('empty').style.display = posts.length?'none':'block';
    document.getElementById('count').textContent = posts.length+' '+t('results');
    renderMore();
  }
  function rerender(){
    var keep=_cur, n=_shown;
    document.getElementById('grid').innerHTML='';
    document.getElementById('count').textContent = keep.length+' '+t('results');
    _cur=keep; _shown=0;
    var grid=document.getElementById('grid');
    var end=Math.min(Math.max(n,BATCH), keep.length);
    for(var i=0;i<end;i++) grid.appendChild(card(keep[i]));
    _shown=end;
    document.getElementById('moreBtn').style.display=(_shown<_cur.length)?'inline-block':'none';
  }
  function renderMore(){
    var grid=document.getElementById('grid');
    var end=Math.min(_shown+BATCH, _cur.length);
    for(var i=_shown;i<end;i++) grid.appendChild(card(_cur[i]));
    _shown=end;
    var btn=document.getElementById('moreBtn');
    if(btn) btn.style.display = (_shown<_cur.length)?'inline-block':'none';
  }

  function mediaCount(p){return (p.local_photos||p.photos||[]).length+(p.local_videos||p.videos||[]).length;}
  var _filter='all', _term='', _allPosts=[], _morePosts=[];
  function matchTerm(p){
    if(!_term) return true;
    var hay=((p.text||'')+' '+(p.text_en||'')+' '+(p.hashtags||[]).join(' ')).toLowerCase();
    return hay.indexOf(_term)>=0;
  }
  function applyFilter(){
    if(_filter==='more'){ render(_morePosts.filter(matchTerm)); return; }
    var out=_allPosts.filter(function(p){
      if(_filter==='photo'   && !((p.local_photos||p.photos||[]).length)) return false;
      if(_filter==='video'   && !((p.local_videos||p.videos||[]).length)) return false;
      if(_filter==='painting'&& !((p.hashtags||[]).some(function(x){return /paint|худож|картин/i.test(x);}))) return false;
      if(_filter==='text'    && (mediaCount(p)>0)) return false;
      return matchTerm(p);
    });
    render(out);
  }
  function wire(posts){
    _allPosts=posts;
    var q=document.getElementById('q');
    q.addEventListener('input',function(){_term=q.value.trim().toLowerCase();applyFilter();});
    document.querySelectorAll('.chip').forEach(function(c){
      c.addEventListener('click',function(){
        document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('active');});
        c.classList.add('active'); _filter=c.dataset.f; applyFilter();
      });
    });
  }

  // Lightbox
  var lb=document.getElementById('lb');
  function openLB(type,src){
    lb.querySelectorAll('img,video').forEach(function(n){n.remove();});
    var n=document.createElement(type==='img'?'img':'video');
    n.src=src; if(type!=='img'){n.controls=true;}
    lb.appendChild(n); lb.classList.add('open');
  }
  lb.addEventListener('click',function(e){ if(e.target===lb||e.target.classList.contains('x')) lb.classList.remove('open'); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape') lb.classList.remove('open'); });

  // language buttons
  document.querySelectorAll('.langbar button').forEach(function(b){
    b.addEventListener('click',function(){ setLang(b.getAttribute('data-lang')); });
  });

  if(DATA){ boot(DATA); }
  else{
    fetch('data/catalog.json').then(function(r){return r.json();})
      .then(function(d){DATA=d;boot(d);}).catch(function(){ boot(null); });
  }
})();
</script>
</body>
</html>
